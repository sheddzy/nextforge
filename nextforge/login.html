<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login — Nextforge Academy</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page-wrapper portal-page">
  <div class="portal-card">
    <div class="portal-logo">
      <div class="logo-mark">N</div>
      <h2>Student Portal</h2>
      <p>Sign in to access your lessons, grades and resources.</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
        <div style="text-align:right;margin-top:0.4rem;">
          <a href="contact.html" style="font-size:0.8rem;color:var(--accent);">Forgot password?</a>
        </div>
      </div>
      <button type="submit" class="portal-submit" id="login-btn">Sign In to Portal</button>
    </form>

    <div class="portal-footer-text">
      Not enrolled yet? <a href="courses.html">Enroll Now →</a>
    </div>

    <div style="margin-top:1.5rem;padding:1rem;background:var(--surface);border-radius:8px;font-size:0.8rem;color:var(--text-muted);line-height:1.6;text-align:center;">
      <strong style="color:var(--ink);">Demo Access</strong><br>
      Email: <code>demo@nextforgeacademy.online</code><br>
      Password: <code>nextforge2026</code>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="assets/js/main.js"></script>
<script>
  document.getElementById('nav-placeholder').innerHTML = renderNav('');
  document.getElementById('footer-placeholder').innerHTML = renderFooter();

  // If already logged in, redirect
  if (getCurrentUser()) window.location.href = 'dashboard.html';

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const alertEl = document.getElementById('login-alert');
    const btn = document.getElementById('login-btn');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      alertEl.innerHTML = '<div class="alert alert-error">Please enter your email and password.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';

    // Demo authentication
    // In production: replace with real backend API call
    setTimeout(() => {
      const validUsers = [
        { email: 'demo@nextforgeacademy.online', password: 'nextforge2026', name: 'Demo Student', course: 'Data Analysis', cohort: 'Cohort 5' },
      ];

      // Also check recently enrolled (from localStorage)
      const enrollments = JSON.parse(localStorage.getItem('nfa_enrollments') || '[]');
      const enrolled = enrollments.find(u => u.email === email);

      const user = validUsers.find(u => u.email === email && u.password === password);

      if (user) {
        sessionStorage.setItem('nfa_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      } else if (enrolled && password === 'nextforge2026') {
        sessionStorage.setItem('nfa_user', JSON.stringify({
          email: enrolled.email,
          name: enrolled.firstName + ' ' + enrolled.lastName,
          course: enrolled.courseName,
          cohort: 'Cohort 5'
        }));
        window.location.href = 'dashboard.html';
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Sign In to Portal';
        alertEl.innerHTML = '<div class="alert alert-error">⚠️ Invalid email or password. Use the demo credentials below or contact <a href="mailto:info@nextforgeacademy.online">info@nextforgeacademy.online</a>.</div>';
      }
    }, 1000);
  });
</script>
</body>
</html>
