<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lesson — NextForge Academy</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .lesson-layout { display:grid;grid-template-columns:300px 1fr;min-height:100vh; }
    .lesson-sidebar {
      background:var(--bg-2);border-right:1px solid var(--border);
      padding:0;overflow-y:auto;position:sticky;top:0;height:100vh;
    }
    .lesson-sidebar-header { padding:20px;border-bottom:1px solid var(--border); }
    .lesson-sidebar-title { font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--white);margin-bottom:4px; }
    .lesson-sidebar-meta { font-size:0.78rem;color:var(--muted); }
    .lesson-item {
      display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;
      border-bottom:1px solid var(--border);transition:background var(--transition);
    }
    .lesson-item:hover { background:var(--bg-3); }
    .lesson-item.active { background:var(--amber-dim);border-left:3px solid var(--amber); }
    .lesson-item-check {
      width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;
    }
    .lesson-item-check.done { background:var(--amber);border-color:var(--amber);color:#0e0e0f; }
    .lesson-item-title { font-size:0.85rem;color:var(--text);flex:1; }
    .lesson-item-dur { font-size:0.72rem;color:var(--muted); }
    .lesson-main { background:var(--bg);overflow-y:auto; }
    .lesson-top-bar {
      position:sticky;top:0;z-index:10;
      background:rgba(14,14,15,0.9);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
    }
    .lesson-body { padding:40px;max-width:800px; }
    .lesson-week { font-size:0.75rem;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px; }
    .lesson-title { font-size:clamp(1.4rem,3vw,2rem);margin-bottom:24px; }
    .lesson-content {
      background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:32px;margin-bottom:28px;font-size:0.95rem;line-height:1.8;color:var(--text);
    }
    .lesson-nav { display:flex;justify-content:space-between;gap:12px;margin-top:32px; }
    @media(max-width:768px){
      .lesson-layout{grid-template-columns:1fr}
      .lesson-sidebar{display:none}
      .lesson-body{padding:24px}
    }
  </style>
</head>
<body>
  <div class="lesson-layout">
    <!-- LESSON SIDEBAR -->
    <aside class="lesson-sidebar">
      <div class="lesson-sidebar-header">
        <a href="/student/dashboard.html" style="font-size:0.8rem;color:var(--amber);display:block;margin-bottom:10px">← Dashboard</a>
        <div class="lesson-sidebar-title" id="sidebarTitle">Loading...</div>
        <div class="lesson-sidebar-meta" id="sidebarMeta"></div>
        <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" id="sidebarProgress" style="width:0%"></div></div>
      </div>
      <div id="lessonsList"></div>
    </aside>

    <!-- MAIN -->
    <div class="lesson-main">
      <div class="lesson-top-bar">
        <a href="/student/dashboard.html" style="font-size:0.85rem;color:var(--muted)">← Back</a>
        <button class="btn btn-primary btn-sm" id="completeBtn" onclick="markComplete()">Mark Complete ✓</button>
      </div>

      <div class="lesson-body">
        <div class="lesson-week" id="lessonWeek">Week 1</div>
        <h1 class="lesson-title" id="lessonTitle">Loading lesson...</h1>
        <div class="lesson-content" id="lessonContent">Please wait...</div>

        <div class="lesson-nav">
          <button class="btn btn-ghost" id="prevBtn" onclick="navigateLesson(-1)">← Previous</button>
          <button class="btn btn-primary" id="nextBtn" onclick="navigateLesson(1)">Next Lesson →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('nf_token');
    if (!token) window.location.href = '/login.html';

    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('course') || 1;
    let lessons = [], currentIndex = 0, progressData = {};

    async function authFetch(url, opts = {}) {
      const res = await fetch(url, {
        ...opts,
        credentials: 'include',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
      });
      return res.json();
    }

    async function loadCourse() {
      const course = await authFetch(`/api/courses/${courseId}`);
      lessons = course.lessons || [];

      document.getElementById('sidebarTitle').textContent = course.title;
      document.getElementById('sidebarMeta').textContent = `${lessons.length} lessons · ${course.duration}`;

      const progress = await authFetch(`/api/progress/course/${courseId}`);
      progressData = progress;
      document.getElementById('sidebarProgress').style.width = progress.percent + '%';

      renderSidebar();
      loadLesson(0);
    }

    function renderSidebar() {
      const list = document.getElementById('lessonsList');
      list.innerHTML = lessons.map((l, i) => `
        <div class="lesson-item ${i === currentIndex ? 'active' : ''}" onclick="loadLesson(${i})">
          <div class="lesson-item-check ${l.completed ? 'done' : ''}">✓</div>
          <div class="lesson-item-title">${l.title}</div>
          <div class="lesson-item-dur">${l.duration_mins}m</div>
        </div>
      `).join('');
    }

    function loadLesson(index) {
      if (index < 0 || index >= lessons.length) return;
      currentIndex = index;
      const lesson = lessons[index];

      document.getElementById('lessonWeek').textContent = `Week ${lesson.week_number}`;
      document.getElementById('lessonTitle').textContent = lesson.title;
      document.getElementById('lessonContent').textContent = lesson.content || 'Lesson content coming soon.';

      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === lessons.length - 1;

      renderSidebar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function markComplete() {
      const lesson = lessons[currentIndex];
      await authFetch(`/api/progress/complete/${lesson.id}`, { method: 'POST' });
      lessons[currentIndex].completed = true;
      renderSidebar();

      const btn = document.getElementById('completeBtn');
      btn.textContent = '✓ Completed!';
      btn.style.background = '#4ade80';
      btn.style.color = '#0e0e0f';
      setTimeout(() => {
        btn.textContent = 'Mark Complete ✓';
        btn.style.background = '';
        btn.style.color = '';
      }, 2000);

      // Auto-advance
      if (currentIndex < lessons.length - 1) {
        setTimeout(() => loadLesson(currentIndex + 1), 1000);
      }
    }

    function navigateLesson(dir) { loadLesson(currentIndex + dir); }

    loadCourse();
  </script>
</body>
</html>
