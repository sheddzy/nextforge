html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certificate — NextForge Academy</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;flex-direction:column;gap:24px}
.cert-wrap{width:100%;max-width:800px}
.cert{background:linear-gradient(135deg,#0a1628,#0f1f3d);border:2px solid var(--gold);border-radius:var(--radius-xl);padding:56px 64px;text-align:center;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(201,168,76,0.06),transparent)}
.cert-logo{font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:28px}
.cert-label{font-size:0.8rem;color:var(--text);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.cert-name{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;color:var(--white);margin-bottom:8px}
.cert-course{font-size:1.1rem;color:var(--gold);font-weight:600;margin-bottom:28px}
.cert-divider{width:80px;height:2px;background:var(--gold);margin:0 auto 28px;border-radius:1px}
.cert-code{font-size:0.75rem;color:var(--text);letter-spacing:0.05em;margin-top:28px}
.cert-corner{position:absolute;width:60px;height:60px;border:2px solid var(--gold);opacity:0.3}
.cert-corner.tl{top:16px;left:16px;border-right:none;border-bottom:none}
.cert-corner.tr{top:16px;right:16px;border-left:none;border-bottom:none}
.cert-corner.bl{bottom:16px;left:16px;border-right:none;border-top:none}
.cert-corner.br{bottom:16px;right:16px;border-left:none;border-top:none}
</style>
</head>
<body>
<div class="cert-wrap">
  <div id="loading" style="text-align:center;padding:48px;color:var(--text)">Loading certificate...</div>
  <div id="certContainer" style="display:none">
    <div class="cert" id="certificate">
      <div class="cert-corner tl"></div>
      <div class="cert-corner tr"></div>
      <div class="cert-corner bl"></div>
      <div class="cert-corner br"></div>
      <div class="cert-logo">Next<span style="color:var(--gold)">Forge</span> Academy</div>
      <div class="cert-label">This is to certify that</div>
      <div class="cert-name" id="certName">Student Name</div>
      <div class="cert-divider"></div>
      <div class="cert-label">has successfully completed</div>
      <div class="cert-course" id="certCourse">Course Title</div>
      <div style="font-size:0.88rem;color:var(--text);margin-bottom:8px" id="certDate"></div>
      <div style="display:flex;justify-content:center;gap:40px;margin-top:28px">
        <div style="text-align:center"><div style="width:100px;height:2px;background:var(--border-light);margin-bottom:6px"></div><div style="font-size:0.75rem;color:var(--text)">Shedrack Ebete</div><div style="font-size:0.7rem;color:var(--text);margin-top:1px">Lead Instructor & Founder</div></div>
        <div style="text-align:center"><div style="width:100px;height:2px;background:var(--border-light);margin-bottom:6px"></div><div style="font-size:0.75rem;color:var(--text)">NextForge Academy</div><div style="font-size:0.7rem;color:var(--text);margin-top:1px">Lagos, Nigeria</div></div>
      </div>
      <div class="cert-code" id="certCode">Certificate Code: NF-XXXXXXXX</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="window.print()">🖨 Print Certificate</button>
