<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Comprehensive tech and operations programmes at NextForge Academy. Master Project Management, Data Analysis, Product Management, and more."/>
<title>All Programmes — NextForge Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:#060e1e!important;color:#cbd5e1;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-top:70px;}

:root{
  --navy:#060e1e;--navy2:#0b1729;--navy3:#111f38;
  --gold:#f0a500;--gold2:#fbbf24;--blue:#2563eb;
  --border:rgba(255,255,255,0.07);--text:#94a3b8;--text2:#cbd5e1;
}

.container{max-width:1200px;margin:0 auto;padding:0 24px;}
h1,h2,h3{color:#fff;font-family:'Syne',sans-serif;}
p{line-height:1.7;color:var(--text);}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:70px;background:rgba(6,14,30,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;}
.nav-inner{width:100%;display:flex;justify-content:space-between;align-items:center;}
.logo img{height:38px;}

/* HERO */
.hero{padding:60px 0 40px;text-align:center;border-bottom:1px solid var(--border);}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:16px;}

/* COURSE GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:24px;padding:40px 0;}

/* CARD STYLES */
.cc{background:var(--navy2);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:0.3s;}
.cc:hover{transform:translateY(-5px);border-color:var(--gold);}
.cc-img{height:200px;width:100%;object-fit:cover;}
.cc-body{padding:24px;flex:1;}
.cc-cat{font-size:0.7rem;color:var(--gold);text-transform:uppercase;font-weight:800;letter-spacing:1px;margin-bottom:10px;}
.cc-title{font-size:1.4rem;margin-bottom:12px;}
.cc-desc{font-size:0.9rem;margin-bottom:20px;color:var(--text2);}

/* EXPANDABLE SECTION */
.cc-details{border-top:1px solid var(--border);padding-top:20px;margin-top:auto;}
.detail-label{font-size:0.8rem;color:#fff;font-weight:700;margin-bottom:8px;display:block;}
.gain-list{list-style:none;margin-bottom:20px;}
.gain-list li{font-size:0.85rem;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start;}
.gain-list li::before{content:'✓';color:var(--gold);font-weight:bold;}

.btn{display:inline-block;width:100%;padding:12px;text-align:center;border-radius:10px;font-weight:700;cursor:pointer;transition:0.2s;text-decoration:none;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}

@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo"><img src="https://i.ibb.co/hFC9RPhY/Transparent.png" alt="NextForge Academy"/></a>
    <div style="color:#fff; font-weight:600;">All Courses</div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>Master Your Future</h1>
    <p>Professional certification programmes designed for the modern economy.</p>
  </div>
</div>

<div class="container">
  <div class="grid" id="courseGrid">
    </div>
</div>

<script>
const COURSES = [
  {
    id: 1,
    title: 'Project Management Professional',
    category: 'Management',
    price: '250,000',
    img: 'https://images.unsplash.com/photo-1552664730-d307ca884978?w=600',
    desc: 'A comprehensive journey into modern PM methodologies including Agile, Scrum, and Waterfall.',
    about: 'This course is designed to turn you into a strategic leader. We move beyond theory to show you how to manage budgets, mitigate risks, and lead high-performing teams in tech and construction.',
    gains: [
      'Master Gantt charts and Resource Leveling',
      'Earn a Global Industry-Recognized Certificate',
      'Hands-on training with Jira and Trello',
      'Prepare for the PMP® Exam with Mock Trials'
    ]
  },
  {
    id: 2,
    title: 'Data Analysis & Visualization',
    category: 'Data Science',
    price: '300,000',
    img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600',
    desc: 'Transform raw numbers into compelling business stories using industry-standard tools.',
    about: 'In an era where data is the new oil, this course gives you the drill. You will learn to clean messy data, perform complex queries, and build interactive dashboards that C-suite executives rely on.',
    gains: [
      'Advanced Excel & SQL Mastery',
      'Build Power BI and Tableau Dashboards',
      'Statistical Analysis for Business Growth',
      'Portfolio of 3 Real-world Data Projects'
    ]
  },
  {
    id: 3,
    title: 'Product Management',
    category: 'Product',
    price: '250,000',
    img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600',
    desc: 'Learn to bridge the gap between business, technology, and user experience.',
    about: 'Product Management is about solving the right problems. We teach you how to conduct user research, define product roadmaps, and work with engineers to ship products that users love.',
    gains: [
      'Master User Discovery & Market Research',
      'Create Agile Roadmaps & PRDs',
      'Learn Product Analytics (Mixpanel/Amplitude)',
      'Career coaching for Product Manager roles'
    ]
  },
  {
    id: 4,
    title: 'Notion Systems Mastery',
    category: 'Productivity',
    price: '160,000',
    img: 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=600',
    desc: 'Build high-performance operating systems for yourself or your business.',
    about: 'Stop using Notion as a basic note-taker. This course teaches you Advanced Database Relations, Formulas 2.0, and Automation to build "Second Brain" systems that save 10+ hours a week.',
    gains: [
      'Advanced Database & Formula Architecture',
      'Build Client Portals & Project Managers',
      'Automate workflows with Zapier/Make',
      'Access to exclusive OS Templates'
    ]
  },
  {
    id: 5,
    title: 'Operations Systems Design',
    category: 'Operations',
    price: '200,000',
    img: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=600',
    desc: 'The blueprint for scaling businesses through efficient processes and SOPs.',
    about: 'Designed for Founders and Ops Leads, this course focuses on eliminating bottlenecks. Learn to document Standard Operating Procedures (SOPs) and build a scalable tech stack for your team.',
    gains: [
      'Design End-to-End Business Workflows',
      'SOP Documentation & Management',
      'Team Performance Tracking Systems',
      'Vendor & Tool Stack Optimization'
    ]
  },
  
    function render() {
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = COURSES.map(c => `
    <div class="cc">
      <img src="${c.img}" class="cc-img" alt="${c.title}">
      <div class="cc-body">
        <div class="cc-cat">${c.category}</div>
        <h3 class="cc-title">${c.title}</h3>
        <p class="cc-desc">${c.desc}</p>
        
        <div class="cc-details">
          <span class="detail-label">About the Course</span>
          <p style="font-size:0.85rem; margin-bottom:15px;">${c.about}</p>
          
          <span class="detail-label">What You Will Gain</span>
          <ul class="gain-list">
            ${c.gains.map(g => `<li>${g}</li>`).join('')}
          </ul>
          
          <div style="display:flex; align-items:center; justify-content:space-between; margin-top:20px;">
            <div style="font-size:1.2rem; font-weight:800; color:#fff;">₦${c.price}</div>
            <a href="/register.html?course=${c.id}" class="btn btn-gold" style="width:auto; padding:10px 25px;">Enroll Now</a>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

render();
</script>

</body>
</html>
