<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — NextForge Academy</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
body::before{content:'';position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1400&q=60') center/cover;filter:brightness(0.1);pointer-events:none}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:440px}
.auth-card{background:rgba(15,31,61,0.96);backdrop-filter:blur(20px);border:1px solid var(--border-light);border-radius:var(--radius-xl);padding:40px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blue-light),transparent)}
.view{display:none}.view.active{display:block}
.role-tabs{display:flex;background:var(--navy-3);border-radius:10px;padding:4px;margin-bottom:22px}
.role-tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:0.86rem;font-weight:600;color:var(--text);transition:all var(--transition)}
.role-tab.active{background:var(--blue);color:var(--white)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <a href="/" style="font-weight:800;font-size:1.25rem;color:var(--white)">Next<span style="color:var(--gold)">Forge</span> Academy</a>
    </div>

    <!-- LOGIN -->
    <div class="view active" id="loginView">
      <div style="font-size:1.3rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:4px">Welcome Back</div>
      <div style="color:var(--text);font-size:0.86rem;text-align:center;margin-bottom:22px">Sign in to your account</div>
      <div class="role-tabs">
        <div class="role-tab active" onclick="setRole('student',this)">👨‍🎓 Student</div>
        <div class="role-tab" onclick="setRole('instructor',this)">👨‍🏫 Instructor</div>
        <div class="role-tab" onclick="setRole('admin',this)">⚙️ Admin</div>
      </div>
      <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" type="email" id="login_email" placeholder="you@example.com"/></div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label class="form-label" style="margin:0">Password</label>
          <span style="font-size:0.8rem;color:var(--gold);cursor:pointer" onclick="showView('forgotView')">Forgot password?</span>
        </div>
        <input class="form-input" type="password" id="login_password" placeholder="Your password" style="margin-top:6px"/>
      </div>
      <div class="alert alert-error" id="loginErr" style="display:none"></div>
      <button class="btn btn-gold" style="width:100%" id="loginBtn" onclick="handleLogin()">Sign In →</button>
      <div style="text-align:center;margin-top:16px;font-size:0.84rem;color:var(--text)">Don't have an account? <a href="/register.html" style="color:var(--gold)">Sign up free</a></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="view" id="forgotView">
      <div style="font-size:1.3rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:4px">Reset Password</div>
      <div style="color:var(--text);font-size:0.86rem;text-align:center;margin-bottom:22px">Enter your email to receive a reset link</div>
      <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" type="email" id="forgot_email" placeholder="you@example.com"/></div>
      <div class="alert alert-error" id="forgotErr" style="display:none"></div>
      <div class="alert alert-success" id="forgotOk" style="display:none"></div>
      <button class="btn btn-gold" style="width:100%" id="forgotBtn" onclick="handleForgot()">Send Reset Link →</button>
      <div style="text-align:center;margin-top:14px;font-size:0.82rem"><a href="#" style="color:var(--gold)" onclick="showView('loginView')">← Back to sign in</a></div>
    </div>

    <!-- RESET PASSWORD -->
    <div class="view" id="resetView">
      <div style="font-size:1.3rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:4px">New Password</div>
      <div style="color:var(--text);font-size:0.86rem;text-align:center;margin-bottom:22px">Enter your new password</div>
      <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" id="new_password" placeholder="Min. 8 characters"/></div>
      <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" type="password" id="confirm_password" placeholder="Repeat password"/></div>
      <div class="alert alert-error" id="resetErr" style="display:none"></div>
      <button class="btn btn-gold" style="width:100%" id="resetBtn" onclick="handleReset()">Update Password →</button>
    </div>
  </div>
</div>

<script>
let selectedRole='student';
function setRole(r,el){selectedRole=r;document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.style.display='block';}

const params=new URLSearchParams(location.search);
if(params.get('reset_token'))showView('resetView');

async function handleLogin(){
  const email=document.getElementById('login_email').value;
  const password=document.getElementById('login_password').value;
  document.getElementById('loginErr').style.display='none';
  if(!email||!password)return showErr('loginErr','Please fill in all fields.');
  const btn=document.getElementById('loginBtn');btn.textContent='Signing in...';btn.disabled=true;
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok)return showErr('loginErr',data.error||'Login failed.');
    localStorage.setItem('nf_token',data.token);
    localStorage.setItem('nf_role',data.role);
    localStorage.setItem('nf_name',data.name);
    const redirectMap={admin:'/admin/dashboard.html',instructor:'/instructor/dashboard.html',student:'/student/dashboard.html'};
    window.location.href=redirectMap[data.role]||'/student/dashboard.html';
  }catch{showErr('loginErr','Network error. Please try again.');}
  finally{btn.textContent='Sign In →';btn.disabled=false;}
}

async function handleForgot(){
  const email=document.getElementById('forgot_email').value;
  document.getElementById('forgotErr').style.display='none';
  document.getElementById('forgotOk').style.display='none';
  if(!email)return showErr('forgotErr','Please enter your email.');
  const btn=document.getElementById('forgotBtn');btn.textContent='Sending...';btn.disabled=true;
  try{
    const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const data=await res.json();
    if(!res.ok)return showErr('forgotErr',data.error||'Failed.');
    document.getElementById('forgotOk').textContent='Reset link sent! Check your inbox.';
    document.getElementById('forgotOk').style.display='block';
  }catch{showErr('forgotErr','Network error.');}
  finally{btn.textContent='Send Reset Link →';btn.disabled=false;}
}

async function handleReset(){
  const np=document.getElementById('new_password').value;
  const cp=document.getElementById('confirm_password').value;
  document.getElementById('resetErr').style.display='none';
  if(np!==cp)return showErr('resetErr','Passwords do not match.');
  if(np.length<8)return showErr('resetErr','Password must be at least 8 characters.');
  const btn=document.getElementById('resetBtn');btn.textContent='Updating...';btn.disabled=true;
  try{
    const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:params.get('reset_token'),password:np})});
    const data=await res.json();
    if(!res.ok)return showErr('resetErr',data.error);
    alert('Password updated! Please sign in.');showView('loginView');
  }catch{showErr('resetErr','Network error.');}
  finally{btn.textContent='Update Password →';btn.disabled=false;}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=document.querySelector('.view.active');if(v.id==='loginView')handleLogin();else if(v.id==='forgotView')handleForgot();}});
</script>
</body>
</html>
