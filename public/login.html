<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — NextForge Academy</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px; }
    body::before {
      content:'';position:fixed;inset:0;
      background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1400&q=60') center/cover;
      filter:brightness(0.12);pointer-events:none;
    }
    .auth-wrap { position:relative;z-index:1;width:100%;max-width:440px; }
    .auth-card {
      background:rgba(15,31,61,0.95);backdrop-filter:blur(20px);
      border:1px solid var(--border-light);border-radius:var(--radius-xl);
      padding:44px;position:relative;overflow:hidden;
    }
    .auth-card::before {
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--gold),var(--blue-light),transparent);
    }
    .auth-title { font-size:1.5rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:6px; }
    .auth-sub { color:var(--text);font-size:0.88rem;text-align:center;margin-bottom:28px; }
    .role-tabs { display:flex;background:var(--navy-3);border-radius:10px;padding:4px;margin-bottom:24px; }
    .role-tab { flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:0.88rem;font-weight:600;color:var(--text);transition:all var(--transition); }
    .role-tab.active { background:var(--blue);color:var(--white); }
    .forgot-link { font-size:0.82rem;color:var(--gold);float:right;margin-top:-4px;cursor:pointer; }
    .auth-footer { text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text); }
    .auth-footer a { color:var(--gold); }
    .view { display:none; }
    .view.active { display:block; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:24px">
        <a href="/" style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.3rem;color:var(--white)">
          Next<span style="color:var(--gold)">Forge</span> Academy
        </a>
      </div>

      <!-- LOGIN VIEW -->
      <div class="view active" id="loginView">
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to your NextForge Academy account</div>
        <div class="role-tabs">
          <div class="role-tab active" onclick="setRole('student',this)">👨‍🎓 Student</div>
          <div class="role-tab" onclick="setRole('staff',this)">👨‍💼 Staff</div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="login_email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <label class="form-label" style="margin-bottom:0">Password</label>
            <span class="forgot-link" onclick="showView('forgotView')">Forgot password?</span>
          </div>
          <input class="form-input" type="password" id="login_password" placeholder="Your password" style="margin-top:7px"/>
        </div>
        <div class="alert alert-error" id="loginError"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="handleLogin()">Sign In →</button>
        <div class="auth-footer">Don't have an account? <a href="/register.html">Sign up free</a></div>
      </div>

      <!-- FORGOT PASSWORD VIEW -->
      <div class="view" id="forgotView">
        <div class="auth-title">Reset Password</div>
        <div class="auth-sub">Enter your email to receive a reset link</div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="forgot_email" placeholder="you@example.com"/>
        </div>
        <div class="alert alert-error" id="forgotError"></div>
        <div class="alert alert-success" id="forgotSuccess"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="handleForgot()">Send Reset Link →</button>
        <div class="auth-footer" style="margin-top:16px"><a href="#" onclick="showView('loginView')">← Back to sign in</a></div>
      </div>

      <!-- RESET PASSWORD VIEW -->
      <div class="view" id="resetView">
        <div class="auth-title">New Password</div>
        <div class="auth-sub">Enter your new password below</div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" id="new_password" placeholder="Min. 8 characters"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" id="confirm_password" placeholder="Repeat password"/>
        </div>
        <div class="alert alert-error" id="resetError"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="handleReset()">Update Password →</button>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = 'student';

    function setRole(role, el) {
      selectedRole = role;
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // Check for reset token in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('reset_token')) showView('resetView');

    async function handleLogin() {
      const email = document.getElementById('login_email').value;
      const password = document.getElementById('login_password').value;
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      if (!email || !password) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }

      const btn = event.target; btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || 'Login failed'; err.style.display = 'block'; return; }
        localStorage.setItem('nf_token', data.token);
        localStorage.setItem('nf_role', data.role);
        localStorage.setItem('nf_name', data.name);
        window.location.href = data.role === 'staff' ? '/admin/dashboard.html' : '/student/dashboard.html';
      } catch { err.textContent = 'Network error. Please try again.'; err.style.display = 'block'; }
      finally { btn.textContent = 'Sign In →'; btn.disabled = false; }
    }

    async function handleForgot() {
      const email = document.getElementById('forgot_email').value;
      const err = document.getElementById('forgotError');
      const suc = document.getElementById('forgotSuccess');
      err.style.display = 'none'; suc.style.display = 'none';
      if (!email) { err.textContent = 'Please enter your email.'; err.style.display = 'block'; return; }

      const btn = event.target; btn.textContent = 'Sending...'; btn.disabled = true;
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        suc.textContent = 'Reset link sent! Check your inbox.'; suc.style.display = 'block';
      } catch { err.textContent = 'Network error.'; err.style.display = 'block'; }
      finally { btn.textContent = 'Send Reset Link →'; btn.disabled = false; }
    }

    async function handleReset() {
      const newPass = document.getElementById('new_password').value;
      const confirm = document.getElementById('confirm_password').value;
      const err = document.getElementById('resetError');
      err.style.display = 'none';
      if (newPass !== confirm) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
      if (newPass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }

      const btn = event.target; btn.textContent = 'Updating...'; btn.disabled = true;
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token: params.get('reset_token'), password: newPass })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        alert('Password updated! Please sign in.'); showView('loginView');
      } catch { err.textContent = 'Network error.'; err.style.display = 'block'; }
      finally { btn.textContent = 'Update Password →'; btn.disabled = false; }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') { const v = document.querySelector('.view.active'); if (v.id === 'loginView') handleLogin(); else if (v.id === 'forgotView') handleForgot(); }});
  </script>
</body>
</html>
