<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — NextForge Academy</title>
    <style>
        :root {
            --bg: #060e1e; --bg2: #0b1729; --gold: #f0a500; --text: #94a3b8; --white: #fff; --border: rgba(255,255,255,0.08);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; }
        .nav-item { padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; transition: 0.2s; color: var(--text); }
        .nav-item:hover, .nav-item.active { background: rgba(240,165,0,0.1); color: var(--gold); }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        h2 { color: var(--white); margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--white); font-size: 0.9rem; }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text); font-style: italic; }
        .btn { background: var(--gold); color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 200px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:#fff;">NextForge Admin</h3>
    <div class="nav-item active" onclick="showSection('students', this)">Students</div>
    <div class="nav-item" onclick="showSection('instructors', this)">Instructors</div>
    <div class="nav-item" onclick="showSection('courses', this)">Manage Courses</div>
    <div class="nav-item" onclick="showSection('promos', this)">Promo Codes</div>
</div>

<div class="main">
    <div id="section-students" class="content-section">
        <h2>Enrolled Students</h2>
        <div class="card">
            <table id="studentTable">
                <thead>
                    <tr><th>Name</th><th>Course</th><th>Status</th></tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>

    <div id="section-promos" class="content-section" style="display:none;">
        <h2>Promo Codes</h2>
        <div class="card">
            <div style="margin-bottom: 20px;">
                <input type="text" id="promoInput" placeholder="CODE20">
                <input type="number" id="promoDisc" placeholder="Discount %">
                <button class="btn" onclick="createPromo()">Add Promo</button>
            </div>
            <table id="promoTable">
                <thead>
                    <tr><th>Code</th><th>Discount</th><th>Usage</th></tr>
                </thead>
                <tbody id="promoList"></tbody>
            </table>
        </div>
    </div>

    <div id="section-instructors" class="content-section" style="display:none;">
        <h2>Instructors</h2>
        <div class="card">
            <table id="instructorTable">
                <thead>
                    <tr><th>Name</th><th>Expertise</th><th>Status</th></tr>
                </thead>
                <tbody id="instructorList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PERSISTENT DATA ENGINE ---
    // This looks for data in LocalStorage, or uses defaults if empty.
    const db = {
        students: JSON.parse(localStorage.getItem('nf_students')) || [
            { name: "John Doe", course: "Project Management", status: "Active" },
            { name: "Jane Smith", course: "Data Analysis", status: "Active" }
        ],
        instructors: JSON.parse(localStorage.getItem('nf_instructors')) || [
            { name: "Shedrack Chinonso", expertise: "Operations", status: "Head" },
            { name: "Dr. Sarah", expertise: "Data Science", status: "Senior" }
        ],
        promos: JSON.parse(localStorage.getItem('nf_promos')) || [
            { code: "WELCOME10", discount: "10%", usage: "5" }
        ]
    };

    function showSection(sectionId, element) {
        // Switch Active Nav
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');

        // Switch Visible Content
        document.querySelectorAll('.content-section').forEach(sec => sec.style.display = 'none');
        document.getElementById('section-' + sectionId).style.display = 'block';

        renderData();
    }

    function renderData() {
        // Render Students
        const studentList = document.getElementById('studentList');
        studentList.innerHTML = db.students.map(s => `
            <tr><td>${s.name}</td><td>${s.course}</td><td>${s.status}</td></tr>
        `).join('') || '<tr><td colspan="3" class="empty-state">No students found.</td></tr>';

        // Render Instructors
        const instructorList = document.getElementById('instructorList');
        instructorList.innerHTML = db.instructors.map(i => `
            <tr><td>${i.name}</td><td>${i.expertise}</td><td>${i.status}</td></tr>
        `).join('') || '<tr><td colspan="3" class="empty-state">No instructors found.</td></tr>';

        // Render Promos
        const promoList = document.getElementById('promoList');
        promoList.innerHTML = db.promos.map(p => `
            <tr><td>${p.code}</td><td>${p.discount}</td><td>${p.usage}</td></tr>
        `).join('') || '<tr><td colspan="3" class="empty-state">No promo codes created.</td></tr>';
    }

    function createPromo() {
        const code = document.getElementById('promoInput').value.trim();
        const disc = document.getElementById('promoDisc').value;

        if (code && disc) {
            db.promos.push({ code: code.toUpperCase(), discount: disc + "%", usage: "0" });
            localStorage.setItem('nf_promos', JSON.stringify(db.promos));
            document.getElementById('promoInput').value = '';
            document.getElementById('promoDisc').value = '';
            renderData();
            alert("Promo code " + code + " saved!");
        } else {
            alert("Please fill in both fields");
        }
    }

    // Initial Load
    window.onload = renderData;
</script>

</body>
</html>
