<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — NextForge Academy</title>
<style>
/*
 * NEXTFORGE PORTAL CSS — SELF-CONTAINED
 * Import this with <style> tag content inside each portal page
 * DO NOT link styles.css in any portal page
 */

@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

/* ── HARD RESET — DARK BACKGROUND GUARANTEED ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
html, body {
  background: #060e1e !important;
  color: #cbd5e1 !important;
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { font-family: inherit; }
img { display: block; max-width: 100%; }
ul { list-style: none; }

:root {
  --bg: #060e1e;
  --bg2: #0b1729;
  --bg3: #111f38;
  --bg4: #182d4e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #94a3b8;
  --text2: #cbd5e1;
  --white: #fff;
  --gold: #f0a500;
  --gold2: #fbbf24;
  --blue: #2563eb;
  --blue2: #3b82f6;
  --green: #059669;
  --green2: #10b981;
  --red: #ef4444;
  --purple: #7c3aed;
}

/* ── LAYOUT ── */
.portal { display: grid; grid-template-columns: 252px 1fr; min-height: 100vh; background: var(--bg); }

/* ── SIDEBAR ── */
.sb {
  background: linear-gradient(180deg, #111f38 0%, #0b1729 55%, #060e1e 100%);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  box-shadow: 3px 0 24px rgba(0,0,0,0.45);
  z-index: 100;
}
.sb::-webkit-scrollbar { width: 3px; }
.sb::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.sb-top { padding: 18px 14px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-logo { display: block; margin-bottom: 14px; }
.sb-logo img { height: 36px; width: auto; object-fit: contain; }
.sb-role-tag {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 0.64rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; margin-bottom: 12px;
}
.sb-role-tag.student { background: rgba(37,99,235,0.15); color: #60a5fa; border: 1px solid rgba(37,99,235,0.25); }
.sb-role-tag.instructor { background: rgba(240,165,0,0.12); color: var(--gold); border: 1px solid rgba(240,165,0,0.22); }
.sb-role-tag.admin { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.22); }

.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 11px; background: rgba(255,255,255,0.05);
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.09);
}
.sb-av {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; overflow: hidden;
}
.sb-av img { width: 100%; height: 100%; object-fit: cover; }
.sb-av.student { background: rgba(37,99,235,0.25); border: 2px solid var(--blue2); }
.sb-av.instructor { background: rgba(240,165,0,0.2); border: 2px solid var(--gold); }
.sb-av.admin { background: rgba(239,68,68,0.2); border: 2px solid var(--red); }
.sb-uname { font-weight: 600; color: var(--white); font-size: 0.84rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-urole { font-size: 0.67rem; color: var(--text); margin-top: 1px; }

.sb-nav { padding: 10px 9px; flex: 1; }
.sb-sec { font-size: 0.62rem; color: rgba(148,163,184,0.4); text-transform: uppercase; letter-spacing: 0.11em; padding: 12px 8px 4px; font-weight: 700; }

.ni {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px;
  font-size: 0.875rem; font-weight: 500; color: rgba(148,163,184,0.8);
  transition: all 0.18s; margin-bottom: 1px;
  text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
}
.ni:hover { background: rgba(255,255,255,0.07); color: var(--white); }
.ni.active { padding-left: 8px; }
.ni.active.student { background: rgba(37,99,235,0.18); color: #60a5fa; border-left: 2px solid var(--blue2); }
.ni.active.instructor { background: rgba(240,165,0,0.12); color: var(--gold2); border-left: 2px solid var(--gold); }
.ni.active.admin { background: rgba(239,68,68,0.12); color: #fca5a5; border-left: 2px solid var(--red); }
.ni-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 0.9rem; }
.ni-badge { margin-left: auto; background: var(--gold); color: #000; border-radius: 10px; padding: 1px 7px; font-size: 0.63rem; font-weight: 700; }
.ni-badge.red { background: var(--red); color: #fff; }

.sb-bot { padding: 9px 9px 15px; border-top: 1px solid var(--border); margin-top: auto; }

/* ── MAIN AREA ── */
.pm {
  background: linear-gradient(160deg, #0b1729 0%, #060e1e 40%, #0b1a35 100%);
  display: flex; flex-direction: column; min-height: 100vh; position: relative;
}
.pm::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(rgba(37,99,235,0.04) 1.5px, transparent 1.5px);
  background-size: 40px 40px;
}
.pm-inner { position: relative; z-index: 1; display: flex; flex-direction: column; flex: 1; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,14,30,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.tb-title { font-weight: 700; color: var(--white); font-size: 1rem; font-family: 'Syne', sans-serif; }
.tb-sub { font-size: 0.73rem; color: var(--text); margin-top: 1px; }

.pc { padding: 22px 24px; flex: 1; }
.page { display: none; }
.page.on { display: block; }

/* ── PROFILE BANNER ── */
.pb {
  background: linear-gradient(135deg, #182d4e 0%, #111f38 60%, #0e1a30 100%);
  border: 1px solid var(--border2); border-radius: 20px;
  padding: 20px 24px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  position: relative; overflow: hidden;
}
.pb::after { content: ''; position: absolute; right: -30px; top: -30px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(240,165,0,0.09), transparent 70%); pointer-events: none; }
.pb-av { width: 62px; height: 62px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; overflow: hidden; position: relative; z-index: 1; }
.pb-av img { width: 100%; height: 100%; object-fit: cover; }
.pb-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
.pb-name { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; color: var(--white); }
.pb-email { font-size: 0.78rem; color: var(--text); margin-top: 2px; }
.pb-id { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 20px; background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.22); font-size: 0.67rem; color: var(--gold); font-weight: 700; margin-top: 5px; }

/* ── COLORFUL STAT CARDS ── */
.sg { display: grid; grid-template-columns: repeat(4,1fr); gap: 13px; margin-bottom: 20px; }
.sc { border-radius: 16px; padding: 18px 19px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
.sc:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
.sc::after { content: ''; position: absolute; top: -12px; right: -12px; width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.08); }
.sc.blue { background: linear-gradient(135deg,#1e3a8a,#2563eb); border: 1px solid rgba(37,99,235,0.45); }
.sc.gold { background: linear-gradient(135deg,#6b3a00,#c47f00); border: 1px solid rgba(196,127,0,0.45); }
.sc.green { background: linear-gradient(135deg,#064e3b,#059669); border: 1px solid rgba(5,150,105,0.45); }
.sc.purple { background: linear-gradient(135deg,#3b0764,#7c3aed); border: 1px solid rgba(124,58,237,0.45); }
.sc.red { background: linear-gradient(135deg,#7f1d1d,#ef4444); border: 1px solid rgba(239,68,68,0.45); }
.sc.teal { background: linear-gradient(135deg,#0e4c5a,#0891b2); border: 1px solid rgba(8,145,178,0.45); }
.sc-icon { font-size: 1.5rem; margin-bottom: 8px; position: relative; z-index: 1; }
.sc-num { font-size: 1.75rem; font-weight: 800; color: #fff; line-height: 1; font-family: 'Syne', sans-serif; position: relative; z-index: 1; }
.sc-lbl { font-size: 0.74rem; color: rgba(255,255,255,0.75); margin-top: 4px; position: relative; z-index: 1; }

/* ── COLORFUL BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 20px; border-radius: 10px; font-size: 0.875rem; font-weight: 600;
  border: none; transition: all 0.18s; white-space: nowrap;
  cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.btn-blue { background: linear-gradient(135deg,#1d4ed8,#3b82f6); color: #fff; box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
.btn-blue:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
.btn-gold { background: linear-gradient(135deg,#b45309,#f0a500); color: #000; font-weight: 700; box-shadow: 0 4px 14px rgba(240,165,0,0.3); }
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,165,0,0.45); }
.btn-green { background: linear-gradient(135deg,#047857,#10b981); color: #fff; box-shadow: 0 4px 14px rgba(5,150,105,0.3); }
.btn-green:hover { transform: translateY(-1px); }
.btn-red { background: linear-gradient(135deg,#b91c1c,#ef4444); color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,0.3); }
.btn-red:hover { transform: translateY(-1px); }
.btn-purple { background: linear-gradient(135deg,#5b21b6,#7c3aed); color: #fff; }
.btn-purple:hover { transform: translateY(-1px); }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--white); }
.btn-danger { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.22); }
.btn-danger:hover { background: rgba(239,68,68,0.22); }
.btn-success { background: rgba(5,150,105,0.12); color: #34d399; border: 1px solid rgba(5,150,105,0.22); }
.btn-success:hover { background: rgba(5,150,105,0.22); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 8px; }
.btn-lg { padding: 12px 28px; font-size: 0.95rem; border-radius: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* ── CARDS ── */
.card { background: rgba(17,31,56,0.88); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
.card h3, .card h4 { color: var(--white); }

/* ── SECTION CARD ── */
.sec-card { background: rgba(17,31,56,0.88); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
.sec-hdr { padding: 13px 17px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: rgba(6,14,30,0.4); }
.sec-hdr h4 { color: var(--white); font-size: 0.9rem; }
.sec-body { padding: 17px; }

/* ── TABLE ── */
.tw { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 480px; }
th { text-align: left; padding: 10px 14px; font-size: 0.69rem; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: rgba(6,14,30,0.3); font-weight: 600; white-space: nowrap; }
td { padding: 11px 14px; font-size: 0.85rem; color: var(--text2); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── PROGRESS BAR ── */
.pbar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.pfill { height: 100%; background: linear-gradient(90deg,var(--blue),var(--blue2)); border-radius: 3px; transition: width 0.8s; }
.pfill.gold { background: linear-gradient(90deg,var(--gold),var(--gold2)); }
.pfill.green { background: linear-gradient(90deg,var(--green),var(--green2)); }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; }
.b-blue { background: rgba(37,99,235,0.15); color: #60a5fa; border: 1px solid rgba(37,99,235,0.25); }
.b-gold { background: rgba(240,165,0,0.12); color: var(--gold); border: 1px solid rgba(240,165,0,0.22); }
.b-green { background: rgba(5,150,105,0.12); color: #34d399; border: 1px solid rgba(5,150,105,0.22); }
.b-red { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.22); }
.b-purple { background: rgba(124,58,237,0.12); color: #a78bfa; border: 1px solid rgba(124,58,237,0.22); }

/* ── ALERTS ── */
.al-err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.22); color: #fca5a5; padding: 10px 13px; border-radius: 8px; font-size: 0.84rem; margin-bottom: 12px; display: none; }
.al-ok { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.22); color: #6ee7b7; padding: 10px 13px; border-radius: 8px; font-size: 0.84rem; margin-bottom: 12px; display: none; }
.al-info { background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.22); color: #93c5fd; padding: 10px 13px; border-radius: 8px; font-size: 0.84rem; margin-bottom: 12px; }

/* ── FORM ── */
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 0.79rem; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
.fi { width: 100%; background: rgba(17,31,56,0.9); border: 1.5px solid var(--border2); border-radius: 10px; padding: 10px 13px; color: var(--white); font-size: 0.9rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
.fi:focus { border-color: var(--blue2); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.fi::placeholder { color: rgba(148,163,184,0.35); }
select.fi option { background: var(--bg2); color: var(--white); }
textarea.fi { resize: vertical; min-height: 80px; line-height: 1.6; }
.g2f { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── ID CARD ── */
.id-card { background: linear-gradient(135deg,#182d4e,#111f38); border: 1.5px solid var(--border2); border-radius: 14px; padding: 16px; text-align: center; position: relative; overflow: hidden; }
.id-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,var(--gold),var(--blue2)); }
.id-num { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--gold); letter-spacing: 0.1em; margin: 8px 0; }

/* ── MODAL ── */
.mo { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.mo.open { opacity: 1; pointer-events: all; }
.mo-box { background: #0b1729; border: 1px solid var(--border2); border-radius: 20px; padding: 26px; width: 100%; max-width: 560px; position: relative; transform: scale(0.96) translateY(6px); transition: transform 0.2s; max-height: 90vh; overflow-y: auto; }
.mo.open .mo-box { transform: scale(1) translateY(0); }
.mo-x { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 0.85rem; }
.mo-x:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }

/* ── MOBILE TOP BAR ── */
.mob-top {
  display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 56px; background: rgba(6,14,30,0.98); border-bottom: 1px solid var(--border);
  padding: 0 14px; align-items: center; justify-content: space-between;
  backdrop-filter: blur(16px);
}
.mob-logo img { height: 30px; width: auto; object-fit: contain; }
.mob-ham { background: none; border: none; color: var(--white); font-size: 1.4rem; cursor: pointer; padding: 4px; border-radius: 7px; line-height: 1; }
.mob-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 195; }
.mob-ov.open { display: block; }
.sb.mob-open { display: flex !important; position: fixed; z-index: 200; height: 100vh; box-shadow: 4px 0 40px rgba(0,0,0,0.7); }

/* ── COURSE TILE ── */
.ct { background: rgba(17,31,56,0.9); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: all 0.2s; }
.ct:hover { border-color: rgba(37,99,235,0.35); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
.ct-thumb { height: 88px; overflow: hidden; position: relative; }
.ct-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.65; }
.ct-thumb-ov { position: absolute; inset: 0; background: linear-gradient(to top,rgba(6,14,30,0.88),transparent); display: flex; align-items: flex-end; padding: 7px 11px; }
.ct-body { padding: 12px 13px; }
.ct-title { font-weight: 700; color: var(--white); font-size: 0.85rem; margin-bottom: 3px; line-height: 1.3; }
.ct-meta { font-size: 0.72rem; color: var(--text); margin-bottom: 8px; }

/* ── CURRICULUM ITEM ── */
.cur-item { display: flex; align-items: center; gap: 11px; padding: 11px 12px; background: rgba(6,14,30,0.5); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 7px; transition: border-color 0.18s; }
.cur-item:hover { border-color: rgba(37,99,235,0.3); }
.cur-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(37,99,235,0.2); border: 1px solid rgba(37,99,235,0.3); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: var(--blue2); flex-shrink: 0; }
.cur-title { font-size: 0.875rem; font-weight: 600; color: var(--white); }
.cur-meta { font-size: 0.72rem; color: var(--text); margin-top: 1px; }

/* ── GRID HELPERS ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.cg { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 13px; margin-bottom: 18px; }

/* ── RESPONSIVE ── */
@media(max-width:1024px) {
  .portal { grid-template-columns: 1fr; }
  .sb { display: none; }
  .mob-top { display: flex; }
  body { padding-top: 56px !important; }
  .pm::before { top: 56px; }
  .topbar { display: none; }
  .pc { padding: 14px 13px; }
  .sg { grid-template-columns: 1fr 1fr; }
  .g2 { grid-template-columns: 1fr; }
  .g2f { grid-template-columns: 1fr; }
}
@media(max-width:600px) {
  .pb { padding: 14px; }
  .pb-av { width: 50px; height: 50px; font-size: 1.2rem; }
  .pb-name { font-size: 1rem; }
  .pc { padding: 10px; }
  .sg { grid-template-columns: 1fr 1fr; }
  .sc { padding: 14px; }
  .sc-num { font-size: 1.5rem; }
  .mo-box { padding: 18px; }
}

html,body{background:#060e1e!important;}
.sb{background:linear-gradient(180deg,#1a0814 0%,#0f0610 55%,#060e1e 100%);}
.pending-card{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(6,14,30,0.5);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap;}
.pending-av{width:40px;height:40px;border-radius:50%;background:rgba(240,165,0,0.15);border:2px solid rgba(240,165,0,0.3);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden;}
.pending-av img{width:100%;height:100%;object-fit:cover;}
.price-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.price-row:last-child{border-bottom:none;}
.promo-tag{font-family:monospace;background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);color:var(--gold);padding:2px 8px;border-radius:6px;font-size:0.85rem;font-weight:700;letter-spacing:0.06em;}
</style>

<body>
