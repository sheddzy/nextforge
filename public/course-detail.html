<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="All NextForge Academy programmes."/>
<title>All Courses — NextForge Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* CSS VARIABLES & RESET */
:root {
  --navy: #060e1e; --navy2: #0b1729; --navy3: #111f38;
  --gold: #f0a500; --gold2: #fbbf24; --blue: #2563eb;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #94a3b8; --text2: #cbd5e1; --white: #fff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--navy)!important;color:var(--text2);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-top:70px;}
a{text-decoration:none;color:inherit;}
h1,h2,h3,h4{color:#fff;font-family:'Syne',sans-serif;line-height:1.2;}
.container{max-width:1200px;margin:0 auto;padding:0 24px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border-radius:10px;font-size:0.875rem;font-weight:600;border:none;transition:all 0.18s;cursor:pointer;text-decoration:none;font-family:'Inter',sans-serif;}
.btn-gold{background:linear-gradient(135deg,#b45309,var(--gold));color:#000;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(240,165,0,0.45);}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:#fff;}
.btn-sm{padding:6px 14px;font-size:0.8rem;border-radius:8px;}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:70px;background:rgba(6,14,30,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;}
.nav-inner{width:100%;display:flex;justify-content:space-between;align-items:center;}
.logo img{height:38px;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{font-size:0.9rem;font-weight:500;color:var(--text2);transition:0.2s;}
.nav-links a:hover{color:#fff;}

/* HERO & FILTERS */
.hero{padding:50px 0 40px;background:linear-gradient(145deg, var(--navy2) 0%, var(--navy) 100%);border-bottom:1px solid var(--border);}
.filter-bar{background:var(--navy2);border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:70px;z-index:100;}
.filters{display:flex;gap:8px;flex-wrap:wrap;}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.18s;}
.filter-chip.active{background:rgba(240,165,0,0.12);border-color:var(--gold);color:var(--gold);}

/* COURSE GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));gap:24px;padding:40px 0 60px;}
.cc{background:var(--navy2);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:0.3s;display:flex;flex-direction:column;}
.cc:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.cc-img{height:180px;width:100%;object-fit:cover;}
.cc-body{padding:24px;flex:1;display:flex;flex-direction:column;}
.cc-cat{font-size:0.7rem;color:var(--gold);text-transform:uppercase;font-weight:800;letter-spacing:1px;margin-bottom:10px;}
.cc-title{font-size:1.3rem;margin-bottom:8px;transition:color 0.2s;}
.cc-title:hover{color:var(--gold);}
.cc-desc{font-size:0.85rem;color:var(--text);line-height:1.6;margin-bottom:16px;flex:1;}
.cc-meta{display:flex;gap:10px;font-size:0.75rem;color:var(--text2);margin-bottom:16px;}
.cc-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--border);}
.cc-price{font-size:1.1rem;font-weight:800;color:#fff;}

/* FOOTER */
footer{background:var(--navy2);border-top:1px solid var(--border);padding:50px 0 30px;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo"><img src="https://i.ibb.co/hFC9RPhY/Transparent.png" alt="NextForge Academy"/></a>
    <div class="nav-links">
      <a href="/courses.html" style="color:var(--gold);">Courses</a>
      <a href="/login.html" class="btn btn-ghost btn-sm">Log In</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <div style="font-size:0.75rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;">All Programmes</div>
    <h1 style="font-size:clamp(2rem,4vw,3rem);margin-bottom:12px;">Choose Your Path</h1>
    <p style="color:var(--text);font-size:1rem;max-width:500px;line-height:1.6;">Every programme takes you from beginner to job-ready with expert live instruction and real-world projects.</p>
  </div>
</div>

<div class="filter-bar">
  <div class="container filters">
    <button class="filter-chip active" onclick="setFilter('all', this)">All Courses</button>
    <button class="filter-chip" onclick="setFilter('Project Management', this)">Project Management</button>
    <button class="filter-chip" onclick="setFilter('Data Analysis', this)">Data Analysis</button>
    <button class="filter-chip" onclick="setFilter('Product Management', this)">Product Management</button>
    <button class="filter-chip" onclick="setFilter('Operations', this)">Operations</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="courseGrid"></div>
</div>

<footer>
  <div class="container" style="text-align:center;color:var(--text);font-size:0.85rem;">
    © 2026 NextForge Academy. All rights reserved.
  </div>
</footer>

<script>
// UNIFIED COURSE DATABASE
const COURSES = [
  {
    id: 1, title: 'Project Management Professional', category: 'Project Management', duration: '12 weeks', level: 'Beginner to Pro', price: 250000,
    img: 'https://images.unsplash.com/photo-1552664730-d307ca884978?w=600', thumbnail: '📋',
    desc: 'Master PM fundamentals from initiation to closure. Build a full portfolio of real-world projects used in global tech industries.'
  },
  {
    id: 2, title: 'Data Analysis & Visualization', category: 'Data Analysis', duration: '12 weeks', level: 'Beginner', price: 300000,
    img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600', thumbnail: '📊',
    desc: 'Go from zero to insights using Excel, SQL, and Power BI. Build dashboards that drive major business decisions.'
  },
  {
    id: 3, title: 'Product Management', category: 'Product Management', duration: '13 weeks', level: 'Intermediate', price: 250000,
    img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600', thumbnail: '🧭',
    desc: 'Learn discovery, roadmapping, and prioritisation. Transition into tech as a skilled Product Manager with expert-led live cohorts.'
  },
  {
    id: 4, title: 'Notion Mastery (Systems Design)', category: 'Productivity', duration: '6 weeks', level: 'Beginner', price: 160000,
    img: 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=600', thumbnail: '🗂',
    desc: 'Design custom business operating systems. Automate workflows and build team workspaces that improve efficiency by 40%.'
  },
  {
    id: 5, title: 'Operations Systems Design', category: 'Operations', duration: '8 weeks', level: 'Intermediate', price: 200000,
    img: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=600', thumbnail: '⚙️',
    desc: 'The blueprint for scaling businesses through efficient processes, Standard Operating Procedures (SOPs), and automations.'
  },
  {
    id: 6, title: 'Business Communication', category: 'Communication', duration: '8 weeks', level: 'Beginner', price: 200000,
    img: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=600', thumbnail: '💡',
    desc: 'Elevate your professional presence. Master executive presentations, high-stakes emailing, and global business English.'
  }
];

let filtered = [...COURSES];

function setFilter(cat, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filtered = cat === 'all' ? [...COURSES] : COURSES.filter(c => c.category.includes(cat));
  render();
}

function render() {
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = filtered.map(c => `
    <div class="cc">
      <a href="course-detail.html?id=${c.id}" style="display:block;">
        <img src="${c.img}" class="cc-img" alt="${c.title}">
      </a>
      <div class="cc-body">
        <div class="cc-cat">${c.thumbnail} ${c.category}</div>
        <a href="course-detail.html?id=${c.id}">
          <h3 class="cc-title">${c.title}</h3>
        </a>
        <p class="cc-desc">${c.desc}</p>
        <div class="cc-meta">
          <span>⭐ 4.9</span><span>·</span><span>${c.duration}</span><span>·</span><span>${c.level}</span>
        </div>
        <div class="cc-foot">
          <div class="cc-price">₦${c.price.toLocaleString()}</div>
          <a href="course-detail.html?id=${c.id}" class="btn btn-gold btn-sm">View Details</a>
        </div>
      </div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
